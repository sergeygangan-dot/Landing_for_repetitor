<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Школьный AI-репетитор</title>
  <style>
    :root {
      color-scheme: light;
      --bg-1: #0f172a;
      --bg-2: #1e3a8a;
      --card: rgba(255, 255, 255, 0.9);
      --panel: rgba(255, 255, 255, 0.88);
      --text: #0f2350;
      --muted: #5f76a3;
      --line: #d5e0f4;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #14803f;
      --error: #c7383d;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    body[data-theme="dark"] {
      --bg-1: #070d1b;
      --bg-2: #13254f;
      --card: rgba(10, 19, 37, 0.85);
      --panel: rgba(12, 25, 48, 0.92);
      --text: #e5efff;
      --muted: #9eb8e8;
      --line: #2d4673;
      --primary: #60a5fa;
      --primary-hover: #3b82f6;
      --success: #5fe28f;
      --error: #ff8b93;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 18px;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, rgba(96, 165, 250, 0.35), transparent 42%),
        radial-gradient(circle at 88% 84%, rgba(56, 189, 248, 0.25), transparent 40%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .page {
      width: min(1050px, 100%);
      backdrop-filter: blur(14px);
      background: var(--card);
      border: 1px solid color-mix(in srgb, var(--line) 50%, #ffffff 20%);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(5, 16, 44, 0.35);
      padding: clamp(20px, 2vw, 34px);
      display: grid;
      gap: 22px;
    }

    h1 {
      margin: 0;
      text-align: center;
      color: var(--text);
      font-size: clamp(30px, 4.5vw, 48px);
      letter-spacing: 0.4px;
      text-wrap: balance;
    }

    .page-top {
      display: flex;
      justify-content: flex-end;
    }

    .theme-toggle {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .theme-toggle:hover:enabled {
      transform: none;
      background: color-mix(in srgb, var(--panel) 88%, #ffffff 12%);
    }

    .subtitle {
      margin: -8px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .layout {
      display: grid;
      gap: 18px;
      grid-template-columns: 320px 1fr;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid color-mix(in srgb, var(--line) 70%, #ffffff 15%);
      border-radius: 18px;
      box-shadow: 0 12px 24px rgba(31, 68, 135, 0.08);
      padding: 18px;
    }

    .panel-title {
      margin: 0 0 12px;
      color: #123364;
      font-size: 20px;
    }

    .login-form {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    .auth-status {
      min-height: 21px;
      margin: 2px 0 0;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--success);
    }

    .auth-status.error {
      color: var(--error);
    }

    label {
      display: grid;
      gap: 6px;
      color: color-mix(in srgb, var(--text) 78%, #8db0e5 22%);
      font-weight: 600;
      font-size: 14px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      padding: 12px 13px;
      outline: none;
      transition: 0.2s border-color, 0.2s box-shadow, 0.2s background-color;
      background: color-mix(in srgb, var(--panel) 82%, #ffffff 18%);
      color: var(--text);
    }

    input::placeholder,
    textarea::placeholder {
      color: #8aa1c8;
    }

    input:focus,
    textarea:focus {
      border-color: #75a7fb;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
    }

    button {
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 12px 15px;
      cursor: pointer;
      transition: 0.2s transform, 0.2s opacity, 0.2s filter;
    }

    button:hover:enabled {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:active:enabled {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      filter: grayscale(0.2);
    }

    .dialog-block {
      display: grid;
      gap: 12px;
    }

    .dialog-block h2 {
      margin: 0;
      color: var(--text);
      font-size: 22px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.45;
    }

    .dialog-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .dialog-hint {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .messages {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: color-mix(in srgb, var(--panel) 88%, #d6e7ff 12%);
      list-style: none;
      min-height: 300px;
      max-height: 420px;
      overflow-y: auto;
      display: grid;
      gap: 8px;
    }

    .composer {
      display: grid;
      gap: 10px;
    }

    .messages li {
      background: color-mix(in srgb, var(--panel) 85%, #ffffff 15%);
      border: 1px solid color-mix(in srgb, var(--line) 80%, #e3edff 20%);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      box-shadow: 0 4px 10px rgba(28, 70, 141, 0.06);
      animation: message-in 0.28s ease;
      transform-origin: top left;
    }

    .section-title {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .icon {
      font-size: 18px;
      line-height: 1;
    }

    @keyframes message-in {
      from {
        opacity: 0;
        transform: translateY(6px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .page {
        border-radius: 18px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
        align-items: stretch;
        justify-content: stretch;
      }

      .page {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
        gap: 12px;
      }

      .page-top {
        position: sticky;
        top: 0;
        z-index: 5;
        background: color-mix(in srgb, var(--card) 92%, transparent 8%);
        padding: 4px 0 6px;
        backdrop-filter: blur(8px);
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        margin-top: -2px;
        font-size: 13px;
      }

      .layout {
        gap: 10px;
      }

      body.auth-complete .layout {
        min-height: calc(100vh - 142px);
      }

      body.auth-complete #loginPanel {
        display: none;
      }

      .panel {
        border-radius: 14px;
        padding: 14px;
      }

      .panel-title,
      .dialog-block h2 {
        font-size: 18px;
      }

      .login-form {
        gap: 10px;
      }

      input,
      textarea,
      button {
        font-size: 16px;
      }

      .dialog-block {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: calc(100vh - 178px);
      }

      body.auth-complete .dialog-block {
        min-height: calc(100vh - 118px);
      }

      textarea {
        min-height: 56px;
        max-height: 120px;
        border-radius: 14px;
      }

      .dialog-controls {
        display: grid;
        grid-template-columns: 1fr;
      }

      .dialog-hint {
        font-size: 13px;
        display: none;
      }

      #sendButton {
        width: 100%;
      }

      .messages {
        min-height: 0;
        max-height: none;
        height: 100%;
        padding: 10px;
        gap: 7px;
      }

      .messages li {
        border-radius: 12px;
        padding: 10px;
      }

      .composer {
        position: sticky;
        bottom: 0;
        z-index: 4;
        padding-top: 10px;
        padding-bottom: calc(2px + env(safe-area-inset-bottom));
        background: color-mix(in srgb, var(--card) 94%, transparent 6%);
        border-top: 1px solid color-mix(in srgb, var(--line) 75%, transparent 25%);
        backdrop-filter: blur(8px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="page-top">
      <button type="button" class="theme-toggle" id="themeToggle">
        <span id="themeIcon">🌙</span>
        <span id="themeText">Темная тема</span>
      </button>
    </div>
    <h1>Школьный AI-репетитор</h1>
    <p class="subtitle">Удобный вход и общение с преподавателем в одном окне</p>

    <div class="layout">
      <section class="panel" id="loginPanel">
        <h2 class="panel-title section-title"><span class="icon">🔐</span>Вход в кабинет</h2>
        <form class="login-form" id="loginForm" action="#" method="post">
          <label>
            Логин
            <input type="text" name="login" id="loginInput" placeholder="Введите логин" required>
          </label>

          <label>
            Пароль
            <input type="password" name="password" id="passwordInput" placeholder="Введите пароль" required>
          </label>

          <button type="submit">Войти</button>
          <p class="auth-status" id="authStatus">Введите логин и пароль</p>
        </form>
      </section>

      <section class="panel dialog-block">
        <h2 class="section-title"><span class="icon">💬</span>Окно диалога</h2>
        <ul class="messages" id="messagesList"></ul>
        <div class="composer">
          <textarea name="dialog" id="dialogInput" placeholder="Введите сообщение..." disabled></textarea>
          <div class="dialog-controls">
            <p class="dialog-hint">После входа можно отправлять сообщения</p>
            <button type="button" id="sendButton" disabled>Отправить</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const VALID_LOGIN = "student";
    const VALID_PASSWORD = "12345";

    const loginForm = document.getElementById("loginForm");
    const loginInput = document.getElementById("loginInput");
    const passwordInput = document.getElementById("passwordInput");
    const authStatus = document.getElementById("authStatus");
    const loginPanel = document.getElementById("loginPanel");
    const dialogInput = document.getElementById("dialogInput");
    const sendButton = document.getElementById("sendButton");
    const messagesList = document.getElementById("messagesList");
    const themeToggle = document.getElementById("themeToggle");
    const themeIcon = document.getElementById("themeIcon");
    const themeText = document.getElementById("themeText");

    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.body.setAttribute("data-theme", isDark ? "dark" : "light");
      themeIcon.textContent = isDark ? "☀️" : "🌙";
      themeText.textContent = isDark ? "Светлая тема" : "Темная тема";
    }

    const savedTheme = localStorage.getItem("tutor-theme") || "light";
    applyTheme(savedTheme);

    themeToggle.addEventListener("click", function () {
      const current = document.body.getAttribute("data-theme") || "light";
      const nextTheme = current === "dark" ? "light" : "dark";
      localStorage.setItem("tutor-theme", nextTheme);
      applyTheme(nextTheme);
    });

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();
      const login = loginInput.value.trim();
      const password = passwordInput.value;

      if (login === VALID_LOGIN && password === VALID_PASSWORD) {
        authStatus.textContent = "Вход выполнен успешно";
        authStatus.classList.remove("error");
        dialogInput.disabled = false;
        sendButton.disabled = false;
        loginPanel.classList.add("is-authenticated");
        document.body.classList.add("auth-complete");
        dialogInput.focus();
        return;
      }

      authStatus.textContent = "Неверный логин или пароль";
      authStatus.classList.add("error");
      dialogInput.disabled = true;
      sendButton.disabled = true;
      loginPanel.classList.remove("is-authenticated");
      document.body.classList.remove("auth-complete");
    });

    sendButton.addEventListener("click", function () {
      const text = dialogInput.value.trim();
      if (!text) {
        return;
      }

      const item = document.createElement("li");
      item.textContent = text;
      messagesList.appendChild(item);
      dialogInput.value = "";
      dialogInput.focus();
    });

    dialogInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        if (!sendButton.disabled) {
          sendButton.click();
        }
      }
    });
  </script>
</body>
</html>
